# Cloudflare Pages配置文件
# 用于配置KV命名空间和其他Cloudflare Pages设置

name = "libretv"
type = "pages"

# 配置KV命名空间绑定
# 注意：在Cloudflare Dashboard中，你需要先创建一个KV命名空间，然后在此处绑定
# 绑定名称必须为"SYNC_KV"，因为functions/sync.js中使用了这个名称
[kv_namespaces]
binding = "SYNC_KV" # 环境变量名称，必须与functions/sync.js中的一致
id = "<Ycbefecc5e90c4377b9235adc8d3055be>" # 替换为你的KV命名空间ID
preview_id = "<cbefecc5e90c4377b9235adc8d3055be>" # 开发环境也使用相同的KV命名空间

# 其他配置
[build]
command = "" # 不需要构建命令
publish = "." # 发布目录为根目录

# 环境变量配置（可选）
[env.production]
# 生产环境的特定配置

[env.development]
# 开发环境的特定配置